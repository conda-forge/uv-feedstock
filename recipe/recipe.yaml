# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.11.19"

package:
  name: uv
  version: ${{ version }}

source:
  url: https://github.com/astral-sh/uv/releases/download/${{ version }}/source.tar.gz
  sha256: 3869ae6f1a54465255d91e17f9e3e91ee3fa26d539990ce6c74ff8b6fe94f994
  patches:
    - 0000-no-link-static-vc-runtime.patch
    - 0001-no-writeln-space-colon.patch

build:
  number: 0
  script:
    file: build-uv
    env:
      CARGO_PROFILE_RELEASE_LTO: fat
      CARGO_PROFILE_RELEASE_STRIP: symbols
      # This env var specifies the base 2 log of the allocator page size
      JEMALLOC_SYS_WITH_LG_PAGE: ${{ "16" if target_platform == "linux-aarch64" or target_platform == "linux-ppc64le" }}
      # used in `build-uv.sh` to verity the expected version of rust
      CBC_RUST_VERSION: ${{ rust_compiler_version | default(".*") }}
      # for cross-compiling issues
      #   fatal error LNK1112: module machine type 'x64' conflicts with target machine type 'ARM64'
      AWS_LC_SYS_CMAKE_BUILDER: "1"
      # for cross-compiling issues
      #   error LNK2019: unresolved external symbol ZSTD_compressStream
      ZSTD_SYS_USE_PKG_CONFIG: "1"

requirements:
  build:
    - ${{ compiler("c") }}
    - ${{ compiler("cxx") }}
    - ${{ compiler("rust") }}
    - ${{ stdlib("c") }}
    - cargo-bundle-licenses
    - cmake
    - make
    - pkg-config
  host:
    - zstd

tests:
  - requirements:
      run:
        - if: win
          then: m2-grep
    script:
      - uv --version
      - uv --help
      - uv --version | grep -iE "${{ version | replace('.', '\\.') }}"

about:
  homepage: https://github.com/astral-sh/uv
  license: Apache-2.0 OR MIT
  license_file:
    - LICENSE-APACHE
    - LICENSE-MIT
    - THIRDPARTY.yml
  summary: An extremely fast Python package installer and resolver, written in Rust.
  documentation: https://docs.astral.sh/uv

extra:
  recipe-maintainers:
    - charliermarsh
    - bollwyvl
